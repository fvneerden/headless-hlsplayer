services:
  hls-monitor:
    build: .
    image: hls-monitor:latest
    container_name: hls-monitor
    restart: unless-stopped

    environment:
      HLS_URL: ""
      ALERT_URL: ""
      SEGMENT_TIMEOUT: "15s"    # Max time to fetch a playlist or segment
      FAIL_COOLDOWN: "60s"      # Minimum time between alert fires
      RETRY_COUNT: "3"          # Number of retries per GET request (0 = no retries)

    # Optional: persist logs
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
